name: Sync Emoji Database

on:
  schedule:
    # Runs every Monday at 03:00 UTC (shortly after Unicode typically publishes)
    - cron: "0 3 * * 1"
  workflow_dispatch: # Allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  sync:
    name: Regenerate emoji metadata
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run metadata.sh
        run: bash plasmoid/contents/service/metadata.sh

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet plasmoid/contents/assets/emoji-metadata.js; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated emoji list
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plasmoid/contents/assets/emoji-metadata.js
          git commit -m "chore: sync emoji database [skip ci]"
          git push
